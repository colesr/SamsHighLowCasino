<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam's High/Low // NEON DISTRICT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap');

:root {
  --bg:        #04010a;
  --surface:   rgba(6,2,18,0.92);
  --panel:     rgba(10,4,28,0.95);
  --pink:      #ff2d78;
  --cyan:      #00f5ff;
  --yellow:    #ffe600;
  --green:     #00ff9d;
  --purple:    #b24bff;
  --red:       #ff3131;
  --text:      #ccd6f6;
  --text-dim:  #3a4060;
  --text-bright: #ffffff;
  --border-pink: rgba(255,45,120,0.4);
  --border-cyan: rgba(0,245,255,0.35);
  --glow-pink:   0 0 20px rgba(255,45,120,0.5);
  --glow-cyan:   0 0 20px rgba(0,245,255,0.5);
  --glow-green:  0 0 20px rgba(0,255,157,0.5);
  --glow-yellow: 0 0 20px rgba(255,230,0,0.5);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Share Tech Mono', monospace;
  color: var(--text);
  overflow-x: hidden;
}

#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

#grain {
  position:fixed; inset:0; z-index:1; pointer-events:none; opacity:0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
  animation: grainShift 0.4s steps(1) infinite;
}
@keyframes grainShift {
  0%  { background-position: 0 0; }
  25% { background-position: -30px 20px; }
  50% { background-position: 40px -15px; }
  75% { background-position: -20px -30px; }
}

#vignette {
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:
    radial-gradient(ellipse 100% 60% at 50% 0%,   rgba(255,45,120,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 80%  50% at 100% 100%, rgba(0,245,255,0.06)  0%, transparent 60%),
    radial-gradient(ellipse 70%  50% at 0%   80%,  rgba(178,75,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 100% 100% at 50% 50%,  transparent 40%, rgba(4,1,10,0.7) 100%);
  animation: vigBreath 6s ease-in-out infinite alternate;
}
@keyframes vigBreath { from{opacity:0.8} to{opacity:1} }

#lightsweep {
  position:fixed; top:0; bottom:0; width:3px; z-index:3; pointer-events:none;
  background:linear-gradient(180deg,transparent 0%,var(--cyan) 35%,var(--pink) 65%,transparent 100%);
  filter:blur(3px); opacity:0;
  animation:sweep 9s ease-in-out infinite;
  box-shadow:0 0 30px 8px rgba(0,245,255,0.12);
}
@keyframes sweep { 0%{left:-10px;opacity:0} 5%{opacity:0.7} 95%{opacity:0.7} 100%{left:100vw;opacity:0} }

#scanlines {
  position:fixed; inset:0; z-index:3; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.09) 3px,rgba(0,0,0,0.09) 4px);
}

.wrap {
  position:relative; z-index:10;
  display:flex; justify-content:center; align-items:flex-start;
  min-height:100vh; padding:36px 16px 60px;
}

/* Terminal shell */
.terminal {
  width:100%; max-width:720px;
  background:var(--surface);
  border:1px solid var(--border-pink);
  border-radius:2px;
  position:relative; overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(0,245,255,0.08),
    0 0 60px rgba(255,45,120,0.12),
    0 0 120px rgba(0,0,0,0.95),
    inset 0 0 60px rgba(0,0,0,0.5);
  animation:termBoot 0.6s ease forwards;
}
@keyframes termBoot {
  from{opacity:0;transform:scaleY(0.02) scaleX(0.96);filter:brightness(3)}
  to{opacity:1;transform:scaleY(1) scaleX(1);filter:brightness(1)}
}
.terminal::before,.terminal::after{content:'';position:absolute;width:14px;height:14px;z-index:20;pointer-events:none;}
.terminal::before{top:0;left:0;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);box-shadow:-2px -2px 8px rgba(0,245,255,0.4);}
.terminal::after{bottom:0;right:0;border-bottom:2px solid var(--pink);border-right:2px solid var(--pink);box-shadow:2px 2px 8px rgba(255,45,120,0.4);}

.crt-overlay{position:absolute;inset:0;z-index:15;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);border-radius:2px;}

/* Header */
.term-bar {
  background:var(--panel);
  border-bottom:1px solid rgba(255,45,120,0.2);
  padding:12px 20px;
  display:flex; align-items:center; justify-content:space-between;
  position:relative;
}
.term-bar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pink) 30%,var(--cyan) 70%,transparent);opacity:0.6;}
.bar-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--pink);text-shadow:0 0 12px rgba(255,45,120,0.8),0 0 30px rgba(255,45,120,0.3);letter-spacing:0.18em;animation:titleGlitch 8s steps(1) infinite;}
@keyframes titleGlitch{0%,94%,100%{text-shadow:0 0 12px rgba(255,45,120,0.8),0 0 30px rgba(255,45,120,0.3);transform:none}95%{text-shadow:3px 0 var(--cyan),-3px 0 var(--pink);transform:skewX(1deg)}96%{text-shadow:-2px 0 var(--yellow),2px 0 var(--cyan);transform:skewX(-1deg)}97%{text-shadow:0 0 12px rgba(255,45,120,0.8);transform:none}}
.bar-sub{font-size:9px;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;margin-top:3px;}
.bar-right{display:flex;align-items:center;gap:12px;}
.led-group{display:flex;gap:6px;align-items:center;}
.led{width:7px;height:7px;border-radius:50%;animation:ledPulse 2.4s ease-in-out infinite;}
.led.pink{background:var(--pink);box-shadow:0 0 6px var(--pink);animation-delay:0s;}
.led.cyan{background:var(--cyan);box-shadow:0 0 6px var(--cyan);animation-delay:0.8s;}
.led.yellow{background:var(--yellow);box-shadow:0 0 6px var(--yellow);animation-delay:1.6s;}
@keyframes ledPulse{0%,100%{opacity:1}50%{opacity:0.2}}
.sys-text{font-size:9px;color:var(--text-dim);letter-spacing:0.12em;}

/* Output */
.output{padding:20px 24px 12px;min-height:260px;max-height:460px;overflow-y:auto;font-size:13px;line-height:1.9;color:var(--text);position:relative;}
.output::-webkit-scrollbar{width:3px;}
.output::-webkit-scrollbar-track{background:transparent;}
.output::-webkit-scrollbar-thumb{background:var(--border-pink);border-radius:2px;}
.line{display:block;white-space:pre-wrap;word-break:break-word;}
.line.fade-in{animation:lineFade 0.2s ease forwards;}
@keyframes lineFade{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.line.green{color:var(--green);}
.line.red{color:var(--red);}
.line.yellow{color:var(--yellow);}
.line.cyan{color:var(--cyan);}
.line.pink{color:var(--pink);}
.line.purple{color:var(--purple);}
.line.dim{color:var(--text-dim);}
.line.divider{color:rgba(255,45,120,0.2);}
.line.bold{font-family:'Orbitron',monospace;font-size:12px;color:var(--cyan);letter-spacing:0.12em;text-shadow:0 0 8px rgba(0,245,255,0.6);}
.line.big{font-family:'VT323',monospace;font-size:22px;color:var(--pink);text-shadow:0 0 10px rgba(255,45,120,0.7);}
.line.bonus{color:var(--yellow);text-shadow:0 0 8px rgba(255,230,0,0.6);font-weight:bold;}

/* Number cards */
.number-display{display:flex;gap:16px;padding:12px 24px 6px;align-items:center;}
.num-card{flex:1;position:relative;overflow:hidden;background:rgba(10,4,28,0.9);border:1px solid rgba(0,245,255,0.2);border-radius:2px;padding:16px 20px;text-align:center;transition:all 0.35s;}
.num-card::before,.num-card::after{content:'';position:absolute;width:8px;height:8px;pointer-events:none;}
.num-card::before{top:0;left:0;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan);}
.num-card::after{bottom:0;right:0;border-bottom:1px solid var(--pink);border-right:1px solid var(--pink);}
.num-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
.num-value{font-family:'Orbitron',monospace;font-size:38px;font-weight:900;color:var(--cyan);text-shadow:0 0 20px rgba(0,245,255,0.6);line-height:1;transition:all 0.3s;}
.num-card.scrambling .num-value{animation:scramble 0.05s steps(1) infinite;color:var(--purple);text-shadow:0 0 15px rgba(178,75,255,0.8);}
@keyframes scramble{0%{opacity:1}49%{opacity:0.3}50%{opacity:1}}
.num-card.win{border-color:var(--green);box-shadow:var(--glow-green),inset 0 0 30px rgba(0,255,157,0.06);}
.num-card.win .num-value{color:var(--green);text-shadow:0 0 20px rgba(0,255,157,0.8);animation:winPop 0.6s ease;}
@keyframes winPop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
.num-card.lose{border-color:var(--red);box-shadow:var(--glow-pink),inset 0 0 30px rgba(255,45,120,0.06);}
.num-card.lose .num-value{color:var(--red);text-shadow:0 0 15px rgba(255,49,49,0.8);}
.num-card.flip-in{animation:cardFlip 0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
@keyframes cardFlip{from{transform:perspective(500px) rotateY(-85deg) scaleX(0.3);opacity:0}to{transform:perspective(500px) rotateY(0deg) scaleX(1);opacity:1}}
.vs-badge{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--pink);text-shadow:0 0 12px rgba(255,45,120,0.8);letter-spacing:0.15em;flex-shrink:0;animation:vsPulse 2s ease-in-out infinite;}
@keyframes vsPulse{0%,100%{text-shadow:0 0 12px rgba(255,45,120,0.8)}50%{text-shadow:0 0 20px rgba(255,45,120,1),0 0 40px rgba(255,45,120,0.4)}}

/* HUD */
.hud{background:var(--panel);border-top:1px solid rgba(0,245,255,0.12);border-bottom:1px solid rgba(255,45,120,0.12);padding:0;display:flex;position:relative;}
.hud::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan) 40%,var(--pink) 60%,transparent);opacity:0.4;}
.hud-item{flex:1;padding:10px 16px;border-right:1px solid rgba(255,255,255,0.04);display:flex;flex-direction:column;gap:3px;}
.hud-item:last-child{border-right:none;}
.hud-label{font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);}
.hud-val{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--cyan);text-shadow:0 0 10px rgba(0,245,255,0.5);transition:all 0.3s;}
.hud-val.bump{animation:hudBump 0.5s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes hudBump{0%{transform:scale(1)}40%{transform:scale(1.3);filter:brightness(1.5)}100%{transform:scale(1);filter:brightness(1)}}

/* Input */
.input-area{padding:14px 24px;display:flex;align-items:center;gap:12px;background:var(--panel);border-top:1px solid rgba(255,45,120,0.15);position:relative;}
.input-area::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pink),transparent);opacity:0.3;}
.prompt{font-family:'Orbitron',monospace;font-size:11px;color:var(--pink);white-space:nowrap;text-shadow:0 0 10px rgba(255,45,120,0.8);letter-spacing:0.1em;}
input[type="text"],input[type="number"]{flex:1;background:transparent;border:none;border-bottom:1px solid rgba(255,45,120,0.3);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:14px;padding:4px 4px;outline:none;caret-color:var(--pink);transition:border-color 0.2s;text-shadow:0 0 6px rgba(0,245,255,0.4);}
input:focus{border-bottom-color:var(--pink);}
input::placeholder{color:var(--text-dim);text-shadow:none;}

/* Buttons */
.btn-row{padding:10px 24px 18px;display:flex;gap:10px;flex-wrap:wrap;background:var(--panel);}
button{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:0.12em;padding:10px 20px;border-radius:1px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));}
button::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.08) 50%,transparent 100%);transform:translateX(-100%);transition:transform 0.4s;}
button:hover::before{transform:translateX(100%);}
button:active{transform:scale(0.96);}
button.primary{background:rgba(255,45,120,0.12);color:var(--pink);border:1px solid var(--border-pink);text-shadow:0 0 8px rgba(255,45,120,0.7);box-shadow:0 0 16px rgba(255,45,120,0.12),inset 0 1px 0 rgba(255,45,120,0.1);}
button.primary:hover{background:rgba(255,45,120,0.22);box-shadow:0 0 28px rgba(255,45,120,0.25);}
button.secondary{background:rgba(0,245,255,0.06);color:var(--cyan);border:1px solid var(--border-cyan);text-shadow:0 0 6px rgba(0,245,255,0.5);}
button.secondary:hover{background:rgba(0,245,255,0.14);box-shadow:0 0 20px rgba(0,245,255,0.15);}
button.danger{background:rgba(255,49,49,0.1);color:var(--red);border:1px solid rgba(255,49,49,0.4);text-shadow:0 0 8px rgba(255,49,49,0.6);}
button.danger:hover{background:rgba(255,49,49,0.2);box-shadow:0 0 20px rgba(255,49,49,0.2);}
button.high-btn{background:rgba(0,255,157,0.08);color:var(--green);border:1px solid rgba(0,255,157,0.4);text-shadow:0 0 8px rgba(0,255,157,0.6);font-size:11px;padding:12px 28px;}
button.high-btn:hover{background:rgba(0,255,157,0.18);box-shadow:var(--glow-green);}
button.low-btn{background:rgba(178,75,255,0.1);color:var(--purple);border:1px solid rgba(178,75,255,0.4);text-shadow:0 0 8px rgba(178,75,255,0.6);font-size:11px;padding:12px 28px;}
button.low-btn:hover{background:rgba(178,75,255,0.2);box-shadow:0 0 20px rgba(178,75,255,0.3);}
button:disabled{opacity:0.25;cursor:default;}

/* Flash effects */
@keyframes flashWin{0%{box-shadow:inset 0 0 0px rgba(0,255,157,0)}25%{box-shadow:inset 0 0 80px rgba(0,255,157,0.15)}100%{box-shadow:inset 0 0 0px rgba(0,255,157,0)}}
@keyframes flashLose{0%{box-shadow:inset 0 0 0px rgba(255,45,120,0)}25%{box-shadow:inset 0 0 80px rgba(255,45,120,0.18)}100%{box-shadow:inset 0 0 0px rgba(255,45,120,0)}}
@keyframes flashBonus{0%,100%{box-shadow:inset 0 0 0px rgba(255,230,0,0)}20%{box-shadow:inset 0 0 90px rgba(255,230,0,0.15)}60%{box-shadow:inset 0 0 40px rgba(255,230,0,0.08)}}
.flash-win{animation:flashWin 0.8s ease forwards;}
.flash-lose{animation:flashLose 0.8s ease forwards;}
.flash-bonus{animation:flashBonus 1.0s ease forwards;}

@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-9px) skewX(-1deg)}30%{transform:translateX(9px) skewX(1deg)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}}
.shake{animation:shake 0.5s ease;}

/* Particles */
.particle{position:fixed;pointer-events:none;z-index:999;animation:partFly var(--dur,1s) ease-out forwards;}
@keyframes partFly{0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1}100%{transform:translate(var(--dx,0),var(--dy,150px)) rotate(var(--rot,360deg)) scale(0);opacity:0}}
.spark{position:fixed;pointer-events:none;z-index:998;width:2px;height:12px;border-radius:1px;animation:sparkFly var(--dur,0.6s) ease-out forwards;}
@keyframes sparkFly{0%{transform:translate(0,0) rotate(var(--angle,0deg)) scaleY(1);opacity:1}100%{transform:translate(var(--dx,0),var(--dy,80px)) rotate(var(--angle,0deg)) scaleY(0);opacity:0}}
.win-ring{position:fixed;pointer-events:none;z-index:997;border-radius:50%;border:2px solid var(--green);box-shadow:0 0 20px var(--green),inset 0 0 20px rgba(0,255,157,0.1);animation:ringExpand 0.7s ease-out forwards;}
@keyframes ringExpand{from{transform:translate(-50%,-50%) scale(0.2);opacity:1}to{transform:translate(-50%,-50%) scale(3);opacity:0}}
.glitch-line{position:fixed;left:0;right:0;height:2px;z-index:999;background:var(--pink);pointer-events:none;animation:glitchBar 0.4s steps(1) 3;}
@keyframes glitchBar{0%,100%{opacity:0}10%,30%{opacity:1;transform:translateX(4px) skewX(2deg)}20%,40%{opacity:0.6;transform:translateX(-4px) skewX(-2deg)}}

.footer-hint{text-align:center;font-size:9px;letter-spacing:0.15em;color:var(--text-dim);padding:6px 24px 14px;text-transform:uppercase;opacity:0.4;background:var(--panel);border-top:1px solid rgba(255,255,255,0.03);}
.hidden{display:none!important;}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="grain"></div>
<div id="vignette"></div>
<div id="lightsweep"></div>
<div id="scanlines"></div>

<div class="wrap">
<div class="terminal" id="terminal">
  <div class="crt-overlay"></div>
  <div class="term-bar">
    <div>
      <div class="bar-title">SAM'S HIGH/LOW // NEON DISTRICT</div>
      <div class="bar-sub">SECURE BETTING INTERFACE v3.1.7</div>
    </div>
    <div class="bar-right">
      <div class="led-group">
        <div class="led pink"></div>
        <div class="led cyan"></div>
        <div class="led yellow"></div>
      </div>
      <div class="sys-text">SYS:ONLINE</div>
    </div>
  </div>

  <div class="output" id="output"></div>

  <div class="number-display hidden" id="num-display">
    <div class="num-card" id="card-first">
      <div class="num-label">// FIRST ROLL</div>
      <div class="num-value" id="card-first-val">—</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="num-card" id="card-second">
      <div class="num-label">// SECOND ROLL</div>
      <div class="num-value" id="card-second-val">?</div>
    </div>
  </div>

  <div class="hud hidden" id="hud">
    <div class="hud-item">
      <div class="hud-label">// Cash</div>
      <div class="hud-val" id="hud-cash">$1,000</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">// Net P&L</div>
      <div class="hud-val" id="hud-net">+$0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">// Round</div>
      <div class="hud-val" id="hud-round">01</div>
    </div>
  </div>

  <div class="input-area hidden" id="input-area">
    <span class="prompt" id="prompt-label">&gt;&gt;</span>
    <input type="text" id="user-input" autocomplete="off" autocorrect="off" spellcheck="false"/>
  </div>
  <div class="btn-row" id="btn-row"></div>
  <div class="footer-hint">PRESS ENTER TO CONFIRM · CLICK TO SELECT</div>
</div>
</div>

<script>
/* ── ANIMATED BACKGROUND ── */
(function(){
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
  resize(); window.addEventListener('resize',resize);

  let gridOff=0;
  function drawGrid(){
    const vpx=W*0.5,vpy=H*0.44;
    gridOff=(gridOff+0.0005)%(1/16);
    ctx.save();
    for(let r=0;r<=18;r++){
      const f=(r/18+gridOff)%1;
      const ease=Math.pow(f,2.4);
      const y=vpy+(H-vpy)*ease;
      ctx.strokeStyle=`rgba(0,245,255,${f*0.22})`;
      ctx.lineWidth=f*1.4+0.3;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    }
    for(let c=0;c<=22;c++){
      const xb=(c/22)*W;
      ctx.strokeStyle='rgba(255,45,120,0.08)';ctx.lineWidth=0.7;
      ctx.beginPath();ctx.moveTo(vpx,vpy);ctx.lineTo(xb,H);ctx.stroke();
    }
    for(let r=0;r<=10;r++){
      const f=(r/10+gridOff)%1;
      const y=vpy-vpy*Math.pow(f,2.4);
      ctx.strokeStyle=`rgba(178,75,255,${f*0.1})`;ctx.lineWidth=f*0.8;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    }
    for(let c=0;c<=22;c++){
      const xb=(c/22)*W;
      ctx.strokeStyle='rgba(178,75,255,0.05)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(vpx,vpy);ctx.lineTo(xb,0);ctx.stroke();
    }
    ctx.restore();
  }

  const CHARS='01アイウエカキクケコ$#@%&XYZABCDEF';
  const drops=Array.from({length:Math.ceil(innerWidth/18)},()=>({
    x:Math.random(),col:0,speed:0.003+Math.random()*0.007,
    alpha:0.1+Math.random()*0.35,hue:Math.random()<0.5?180:320
  }));
  function drawRain(){
    ctx.save();
    drops.forEach(d=>{
      d.col=(d.col+d.speed)%(1.2);
      if(d.col>1.15){d.col=0;d.x=Math.random();}
      const x=d.x*W,y=d.col*H;
      ctx.font=`13px 'Share Tech Mono',monospace`;
      ctx.fillStyle=`hsla(${d.hue},100%,75%,${d.alpha*1.5})`;
      ctx.fillText(CHARS[Math.floor(Math.random()*CHARS.length)],x,y);
      for(let i=1;i<6;i++){
        const ty=y-i*16; if(ty<0)break;
        ctx.fillStyle=`hsla(${d.hue},100%,55%,${d.alpha*(1-i/6)*0.5})`;
        ctx.fillText(CHARS[Math.floor(Math.random()*CHARS.length)],x,ty);
      }
    });
    ctx.restore();
  }

  const NODES=Array.from({length:14},()=>({
    x:Math.random(),y:Math.random(),
    vx:(Math.random()-0.5)*0.00008,vy:(Math.random()-0.5)*0.00008,
    r:1.5+Math.random()*2.5,phase:Math.random()*Math.PI*2,
    hue:[0,180,270,50][Math.floor(Math.random()*4)]
  }));
  function drawNodes(t){
    ctx.save();
    for(let i=0;i<NODES.length;i++){
      for(let j=i+1;j<NODES.length;j++){
        const a=NODES[i],b=NODES[j];
        const dx=a.x-b.x,dy=a.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<0.22){
          ctx.strokeStyle=`rgba(0,245,255,${(1-dist/0.22)*0.07})`;
          ctx.lineWidth=0.6;ctx.beginPath();
          ctx.moveTo(a.x*W,a.y*H);ctx.lineTo(b.x*W,b.y*H);ctx.stroke();
        }
      }
    }
    NODES.forEach(n=>{
      n.x=(n.x+n.vx+1)%1;n.y=(n.y+n.vy+1)%1;
      const pulse=0.5+0.5*Math.sin(t*0.001+n.phase);
      const glow=4+pulse*14,px=n.x*W,py=n.y*H;
      const g=ctx.createRadialGradient(px,py,0,px,py,glow);
      g.addColorStop(0,`hsla(${n.hue},100%,70%,${0.4+pulse*0.4})`);
      g.addColorStop(1,`hsla(${n.hue},100%,50%,0)`);
      ctx.beginPath();ctx.arc(px,py,glow,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    });
    ctx.restore();
  }

  function mkComet(){return{x:Math.random(),y:Math.random(),angle:Math.PI/4+Math.random()*Math.PI/4,speed:0.003+Math.random()*0.005,len:0.06+Math.random()*0.12,prog:Math.random(),alpha:0.3+Math.random()*0.4,hue:Math.random()<0.5?180:320};}
  const COMETS=Array.from({length:5},mkComet);
  function drawComets(){
    ctx.save();
    COMETS.forEach((c,i)=>{
      c.prog+=c.speed;if(c.prog>1.2)COMETS[i]=mkComet();
      const tx=Math.cos(c.angle),ty=Math.sin(c.angle);
      const hx=(c.x+tx*c.prog)*W,hy=(c.y+ty*c.prog)*H;
      const tx2=(c.x+tx*(c.prog-c.len))*W,ty2=(c.y+ty*(c.prog-c.len))*H;
      const g=ctx.createLinearGradient(tx2,ty2,hx,hy);
      g.addColorStop(0,`hsla(${c.hue},100%,65%,0)`);
      g.addColorStop(1,`hsla(${c.hue},100%,80%,${c.alpha})`);
      ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(tx2,ty2);ctx.lineTo(hx,hy);ctx.stroke();
    });
    ctx.restore();
  }

  function frame(t){
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.max(W,H)*.8);
    bg.addColorStop(0,'#060212');bg.addColorStop(.5,'#04010a');bg.addColorStop(1,'#020008');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    drawGrid();drawRain();drawComets();drawNodes(t);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

/* ── GAME ── */
const output=document.getElementById('output');
const inputEl=document.getElementById('user-input');
const inputArea=document.getElementById('input-area');
const btnRow=document.getElementById('btn-row');
const hud=document.getElementById('hud');
const hudCash=document.getElementById('hud-cash');
const hudNet=document.getElementById('hud-net');
const hudRound=document.getElementById('hud-round');
const promptLabel=document.getElementById('prompt-label');
const numDisplay=document.getElementById('num-display');
const cardFirst=document.getElementById('card-first');
const cardSecond=document.getElementById('card-second');
const cardFirstVal=document.getElementById('card-first-val');
const cardSecondVal=document.getElementById('card-second-val');
const terminal=document.getElementById('terminal');

let state={phase:'name',name:'',cash:1000,startingCash:1000,minVal:1,maxVal:77,firstNumber:0,magicNumber:0,currentBet:0,round:1,addedCash:0};

function print(text,cls='',delay=0){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const el=document.createElement('span');
      el.className='line fade-in'+(cls?' '+cls:'');
      el.textContent=text;
      output.appendChild(el);output.appendChild(document.createElement('br'));
      output.scrollTop=output.scrollHeight;resolve();
    },delay);
  });
}
async function printLines(lines,base=0,step=55){
  for(let i=0;i<lines.length;i++) await print(lines[i][0],lines[i][1]||'',base+i*step);
}

function clearButtons(){btnRow.innerHTML='';}
function addButton(label,cls,fn){const b=document.createElement('button');b.textContent=label;b.className=cls;b.onclick=fn;btnRow.appendChild(b);return b;}
function showInput(type='text',ph=''){inputArea.classList.remove('hidden');inputEl.type=type;inputEl.placeholder=ph;inputEl.value='';setTimeout(()=>inputEl.focus(),60);}
function hideInput(){inputArea.classList.add('hidden');clearButtons();}

function updateHUD(animate=false){
  hudCash.textContent='$'+state.cash.toLocaleString();
  const net=state.cash-state.startingCash;
  hudNet.textContent=(net>=0?'+':'-')+'$'+Math.abs(net).toLocaleString();
  hudNet.style.color=net>=0?'var(--green)':'var(--red)';
  hudRound.textContent=String(state.round).padStart(2,'0');
  if(animate){[hudCash,hudNet,hudRound].forEach(el=>{el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');});}
}

function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function calcMagicNumber(){const r=randInt(1,7**7);const s1=String(r).split('').reduce((a,d)=>a+parseInt(d),0);return String(s1).split('').reduce((a,d)=>a+parseInt(d),0);}

function flashTerminal(cls){terminal.classList.remove('flash-win','flash-lose','flash-bonus');void terminal.offsetWidth;terminal.classList.add(cls);setTimeout(()=>terminal.classList.remove(cls),900);}

function spawnGlitchBars(){
  for(let i=0;i<3;i++){
    const bar=document.createElement('div');bar.className='glitch-line';
    bar.style.top=(20+Math.random()*80)+'%';
    bar.style.background=Math.random()<0.5?'var(--pink)':'var(--cyan)';
    bar.style.height=(1+Math.random()*2)+'px';
    bar.style.animationDelay=(i*0.06)+'s';
    document.body.appendChild(bar);bar.addEventListener('animationend',()=>bar.remove());
  }
}

function spawnParticles(x,y,count=12){
  const em=['💰','🪙','✨','💵','⚡'];
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='particle';
    p.textContent=em[Math.floor(Math.random()*em.length)];
    p.style.fontSize=(14+Math.random()*10)+'px';
    const angle=Math.random()*Math.PI*2,dist=50+Math.random()*140;
    p.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy',(Math.sin(angle)*dist+40)+'px');
    p.style.setProperty('--rot',(Math.random()*720-360)+'deg');
    p.style.setProperty('--dur',(0.7+Math.random()*0.7)+'s');
    p.style.left=x+'px';p.style.top=y+'px';
    p.style.animationDelay=(Math.random()*0.15)+'s';
    document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  }
}

function spawnSparks(x,y,color='#00f5ff',count=16){
  for(let i=0;i<count;i++){
    const s=document.createElement('div');s.className='spark';
    const angle=Math.random()*Math.PI*2,dist=30+Math.random()*80;
    s.style.background=color;s.style.boxShadow=`0 0 4px ${color}`;
    s.style.setProperty('--angle',angle*180/Math.PI+'deg');
    s.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    s.style.setProperty('--dy',Math.sin(angle)*dist+'px');
    s.style.setProperty('--dur',(0.3+Math.random()*0.4)+'s');
    s.style.left=x+'px';s.style.top=y+'px';
    s.style.animationDelay=(Math.random()*0.1)+'s';
    document.body.appendChild(s);s.addEventListener('animationend',()=>s.remove());
  }
}

function spawnWinRing(x,y){
  const r=document.createElement('div');r.className='win-ring';
  r.style.width='60px';r.style.height='60px';r.style.left=x+'px';r.style.top=y+'px';
  document.body.appendChild(r);r.addEventListener('animationend',()=>r.remove());
}

let scrambleIv=null;
function showNumberDisplay(first,second=null){
  numDisplay.classList.remove('hidden');
  cardFirst.className='num-card flip-in';cardSecond.className='num-card';
  cardFirstVal.textContent=first.toLocaleString();cardSecondVal.textContent='?';
  if(second!==null){
    setTimeout(()=>{
      cardSecond.classList.add('scrambling');
      let tick=0;
      scrambleIv=setInterval(()=>{
        cardSecondVal.textContent=randInt(state.minVal,state.maxVal).toLocaleString();
        if(++tick>12){
          clearInterval(scrambleIv);
          cardSecond.classList.remove('scrambling');
          cardSecond.classList.add('flip-in');
          cardSecondVal.textContent=second.toLocaleString();
        }
      },50);
    },350);
  }
}
function hideNumberDisplay(){numDisplay.classList.add('hidden');cardFirst.className='num-card';cardSecond.className='num-card';cardFirstVal.textContent='—';cardSecondVal.textContent='?';}
function colorCards(result){
  setTimeout(()=>{
    if(result==='win'){cardFirst.classList.add('win');cardSecond.classList.add('win');}
    else if(result==='lose'){cardFirst.classList.add('lose');cardSecond.classList.add('lose');}
  },680);
}

function handleInput(val){
  val=val.trim();if(!val)return;
  print('>> '+val,'dim');
  switch(state.phase){
    case 'name':       handleName(val);       break;
    case 'difficulty': handleDifficulty(val); break;
    case 'bet':        handleBet(val);        break;
    case 'guess':      handleGuess(val);      break;
    case 'addCash':    handleAddCash(val);    break;
    case 'addCashAmt': handleAddCashAmt(val); break;
    case 'playAgain':  handlePlayAgain(val);  break;
  }
}

function handleName(val){
  state.name=val.charAt(0).toUpperCase()+val.slice(1).toLowerCase();
  printLines([
    [''],
    ['╔══════════════════════════════════════════╗','cyan'],
    ['║    WELCOME TO SAM\'S HIGH/LOW CASINO      ║','cyan'],
    ['╚══════════════════════════════════════════╝','cyan'],
    [''],
    ['SELECT DIFFICULTY LEVEL:','bold'],
    ['  [1]  EASY    —  range 1 → 77','dim'],
    ['  [2]  MEDIUM  —  range 1 → 7,777','dim'],
    ['  [3]  HARD    —  range 1 → 7,777,777','dim'],
    [''],
  ],0,55);
  setTimeout(()=>{
    state.phase='difficulty';showInput('text','1, 2, or 3');clearButtons();
    addButton('[1] EASY','secondary',()=>handleInput('1'));
    addButton('[2] MEDIUM','secondary',()=>handleInput('2'));
    addButton('[3] HARD','danger',()=>handleInput('3'));
  },750);
}

function handleDifficulty(val){
  if     (val==='1'){state.minVal=1;state.maxVal=77;      print('EASY MODE — range 1 → 77.','yellow');}
  else if(val==='2'){state.minVal=1;state.maxVal=7777;    print('MEDIUM MODE — range 1 → 7,777.','yellow');}
  else if(val==='3'){state.minVal=1;state.maxVal=7777777; print('HARD MODE — range 1 → 7,777,777.','yellow');}
  else{print('Invalid — enter 1, 2, or 3.','red');return;}
  setTimeout(()=>{
    print('Accessing account for '+state.name+'...','dim');
    print('Balance loaded: $'+state.cash.toLocaleString(),'green');
    hud.classList.remove('hidden');updateHUD();setTimeout(startRound,400);
  },200);
}

function startRound(){
  hideNumberDisplay();
  print('');print('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━','divider');
  print('  // ROUND '+String(state.round).padStart(2,'0'),'bold');print('');
  state.phase='bet';showInput('number','Enter wager amount');clearButtons();
  [10,50,100,250].forEach(amt=>{if(amt<=state.cash)addButton('$'+amt,'secondary',()=>handleInput(String(amt)));});
  if(state.cash>0) addButton('⚡ ALL IN  $'+state.cash.toLocaleString(),'danger',()=>handleInput(String(state.cash)));
  promptLabel.textContent='>>';
}

function handleBet(val){
  const bet=parseInt(val);
  if(isNaN(bet)||bet<=0){print('Bet must be greater than $0.','red');return;}
  state.currentBet=Math.min(bet,state.cash);
  if(bet>state.cash) print('Capping at $'+state.cash.toLocaleString()+'.','yellow');
  state.firstNumber=randInt(state.minVal,state.maxVal);
  state.magicNumber=calcMagicNumber();
  print('WAGERING: $'+state.currentBet.toLocaleString(),'yellow');print('');
  showNumberDisplay(state.firstNumber);
  setTimeout(()=>{
    print('FIRST ROLL: '+state.firstNumber.toLocaleString(),'bold');print('');
    print('Will the second number be HIGHER or LOWER?');
    state.phase='guess';showInput('text','high or low');clearButtons();
    addButton('▲  HIGHER','high-btn',()=>handleInput('high'));
    addButton('▼  LOWER','low-btn',()=>handleInput('low'));
    promptLabel.textContent='>>';
  },550);
}

function handleGuess(val){
  val=val.toLowerCase();
  if(val!=='high'&&val!=='low'){print('Type "high" or "low".','red');return;}
  hideInput();
  print('YOUR CALL: '+(val==='high'?'▲ HIGHER':'▼ LOWER'),'dim');
  print('ROLLING...','dim');
  setTimeout(()=>{
    const secondNumber=randInt(state.minVal,state.maxVal);
    showNumberDisplay(state.firstNumber,secondNumber);
    setTimeout(()=>{
      let result='tie';
      if(secondNumber!==state.firstNumber)
        result=((secondNumber>state.firstNumber&&val==='high')||(secondNumber<state.firstNumber&&val==='low'))?'win':'lose';
      colorCards(result);
      setTimeout(()=>{
        if(secondNumber===state.firstNumber){
          flashTerminal('flash-win');print('⚖  TIE — no change.','yellow');
        } else if(result==='win'){
          state.cash+=state.currentBet;flashTerminal('flash-win');
          print('✅  YOU WIN!  +$'+state.currentBet.toLocaleString(),'green');
          const rect=cardSecond.getBoundingClientRect();
          const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
          spawnParticles(cx,cy,16);spawnSparks(cx,cy,'#00ff9d',20);spawnWinRing(cx,cy);
          setTimeout(()=>spawnSparks(cx,cy,'#00f5ff',12),200);
        } else {
          state.cash=Math.max(0,state.cash-state.currentBet);
          flashTerminal('flash-lose');terminal.classList.add('shake');
          setTimeout(()=>terminal.classList.remove('shake'),550);
          spawnGlitchBars();print('❌  YOU LOSE!  -$'+state.currentBet.toLocaleString(),'red');
          const rect=cardSecond.getBoundingClientRect();
          spawnSparks(rect.left+rect.width/2,rect.top+rect.height/2,'#ff2d78',14);
        }
        if(state.magicNumber===Math.abs(secondNumber-state.firstNumber)){
          const bonus=state.currentBet*state.magicNumber;
          setTimeout(()=>{
            flashTerminal('flash-bonus');print('');
            print('✨  MAGIC NUMBER BONUS!  +$'+bonus.toLocaleString(),'bonus');
            state.cash+=bonus;updateHUD(true);
            const rect=numDisplay.getBoundingClientRect();
            spawnSparks(rect.left+rect.width/2,rect.top+rect.height/2,'#ffe600',20);
          },350);
        }
        setTimeout(()=>{
          print('');
          const net=state.cash-state.startingCash;
          print('BALANCE: $'+state.cash.toLocaleString()+'   NET: '+(net>=0?'+':'-')+'$'+Math.abs(net).toLocaleString(),state.cash>=state.startingCash?'green':'red');
          updateHUD(true);
          if(state.cash<=0){
            print('');print('💸  ACCOUNT DEPLETED. GAME OVER, '+state.name.toUpperCase()+'.','red');
            clearButtons();addButton('▶ REINITIALIZE','primary',()=>location.reload());return;
          }
          state.round++;
          setTimeout(()=>{
            print('');print('Add funds to your balance?');
            state.phase='addCash';showInput('text','yes or no');clearButtons();
            addButton('YES — ADD FUNDS','secondary',()=>handleInput('yes'));
            addButton('NO THANKS','primary',()=>handleInput('no'));
            promptLabel.textContent='>>';
          },400);
        },700);
      },650);
    },700);
  },750);
}

function handleAddCash(val){
  if(val==='yes'){state.phase='addCashAmt';showInput('number','Amount to deposit');clearButtons();promptLabel.textContent='DEPOSIT $:';}
  else askPlayAgain();
}
function handleAddCashAmt(val){
  const amt=parseInt(val);
  if(isNaN(amt)||amt<=0){print('Enter a valid amount.','red');return;}
  state.cash+=amt;state.addedCash+=amt;
  print('Deposited $'+amt.toLocaleString()+'  →  Balance: $'+state.cash.toLocaleString(),'green');
  updateHUD(true);askPlayAgain();
}
function askPlayAgain(){
  print('');print('PLAY ANOTHER ROUND?');
  state.phase='playAgain';showInput('text','yes or no');clearButtons();
  addButton('▶ KEEP PLAYING','primary',()=>handleInput('yes'));
  addButton('CASH OUT','secondary',()=>handleInput('no'));
  promptLabel.textContent='>>';
}
function handlePlayAgain(val){
  if(val==='yes'){startRound();}
  else{
    print('');print('THANK YOU, '+state.name.toUpperCase()+'.','bold');
    print('Final balance: $'+state.cash.toLocaleString(),'green');
    const net=state.cash-state.startingCash;
    print('Net: '+(net>=0?'+':'-')+'$'+Math.abs(net).toLocaleString(),net>=0?'green':'red');
    print('');print('// DISCONNECTING FROM NEON DISTRICT...','cyan');
    hideInput();clearButtons();addButton('▶ PLAY AGAIN','primary',()=>location.reload());
  }
}

/* Boot */
(async()=>{
  await print('> INITIALIZING NEON DISTRICT INTERFACE...','dim');
  await new Promise(r=>setTimeout(r,300));
  await print('> ENCRYPTION HANDSHAKE: OK','dim');
  await new Promise(r=>setTimeout(r,200));
  await print('> ACCOUNT SERVERS: CONNECTED','dim');
  await new Promise(r=>setTimeout(r,200));
  await print('> LOADING BETTING MATRIX...','dim');
  await new Promise(r=>setTimeout(r,300));
  await print('','');
  await print('IDENTIFY YOURSELF:','bold');
  state.phase='name';showInput('text','Enter your name');promptLabel.textContent='>>';
})();

inputEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'){const v=inputEl.value.trim();if(v)handleInput(v);inputEl.value='';}
});
