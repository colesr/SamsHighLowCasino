<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam's Slots</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

:root {
  --bg:       #020804;
  --surface:  #040e07;
  --panel:    #071208;
  --border:   #0f3018;
  --border2:  #165225;
  --g0: #00ff41;
  --g1: #00c832;
  --g2: #008f22;
  --g3: #004d12;
  --dim: #1a4a25;
  --text: #a8ffb8;
  --text-dim: #2e6640;
  --red: #ff3333;
  --yellow: #ffe600;
  --glow: 0 0 18px rgba(0,255,65,0.5);
  --glow-sm: 0 0 8px rgba(0,255,65,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Share Tech Mono', monospace;
  color: var(--text);
  overflow-x: hidden;
}

/* Matrix rain canvas behind everything */
#matrix-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.18;
  pointer-events: none;
}

.wrap {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 36px 16px 60px;
}

/* ── Main Terminal ── */
.terminal {
  width: 100%;
  max-width: 660px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 4px;
  box-shadow:
    0 0 0 1px rgba(0,255,65,0.08),
    0 0 60px rgba(0,255,65,0.06),
    0 0 120px rgba(0,0,0,0.9);
  overflow: hidden;
}

/* Scanlines */
.terminal::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 20;
  border-radius: 4px;
}
.terminal { position: relative; }

/* ── Header ── */
.header {
  background: var(--panel);
  border-bottom: 1px solid var(--border2);
  padding: 14px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-family: 'VT323', monospace;
  font-size: 22px;
  color: var(--g0);
  text-shadow: var(--glow-sm);
  letter-spacing: 0.12em;
}
.header-sub {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  margin-top: 2px;
}
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-dim);
}
.led {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--g0);
  box-shadow: 0 0 8px var(--g0);
  animation: led-pulse 2s ease-in-out infinite;
}
@keyframes led-pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── Slot Reels ── */
.reels-section {
  padding: 22px 22px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.reels-frame {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 18px 28px;
  display: flex;
  gap: 18px;
  align-items: center;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 0 20px rgba(0,255,65,0.05);
  position: relative;
}

/* centre guide lines */
.reels-frame::before,
.reels-frame::after {
  content: '';
  position: absolute;
  left: 16px; right: 16px;
  height: 1px;
  background: rgba(0,255,65,0.12);
}
.reels-frame::before { top: 50%; margin-top: -18px; }
.reels-frame::after  { top: 50%; margin-top: 17px; }

.reel {
  width: 80px;
  height: 80px;
  background: #020a04;
  border: 1px solid var(--border2);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'VT323', monospace;
  font-size: 52px;
  color: var(--g0);
  text-shadow: var(--glow);
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  transition: box-shadow 0.3s;
}

.reel.spinning .reel-inner {
  animation: reelSpin 0.08s linear infinite;
}
.reel-inner { display: block; transition: transform 0.1s; }

@keyframes reelSpin {
  0%   { transform: translateY(0); opacity: 1; }
  49%  { transform: translateY(-12px); opacity: 0; }
  50%  { transform: translateY(12px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

.reel.win-big  { border-color: var(--g0); box-shadow: var(--glow), inset 0 0 20px rgba(0,255,65,0.1); }
.reel.win-part { border-color: var(--g1); box-shadow: 0 0 12px rgba(0,200,50,0.4), inset 0 0 20px rgba(0,200,50,0.07); }
.reel.lose     { border-color: #1a0000; box-shadow: 0 0 12px rgba(255,51,51,0.15), inset 0 0 20px rgba(30,0,0,0.5); }

/* ── HUD Bar ── */
.hud {
  display: flex;
  gap: 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  font-size: 12px;
}
.hud-cell {
  flex: 1;
  padding: 10px 16px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.hud-cell:last-child { border-right: none; }
.hud-label { font-size: 9px; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; }
.hud-val   { font-family: 'VT323', monospace; font-size: 22px; color: var(--g0); text-shadow: var(--glow-sm); transition: all 0.3s; }
.hud-val.bump { animation: hud-bump 0.4s ease; }
@keyframes hud-bump { 0%{transform:scale(1)} 40%{transform:scale(1.3)} 100%{transform:scale(1)} }

/* ── Output Log ── */
.output {
  padding: 16px 22px 8px;
  min-height: 120px;
  max-height: 280px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.9;
  color: var(--text);
}
.output::-webkit-scrollbar { width: 3px; }
.output::-webkit-scrollbar-track { background: transparent; }
.output::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.line { display: block; white-space: pre-wrap; word-break: break-word; }
.line.g     { color: var(--g0); }
.line.dim   { color: var(--text-dim); }
.line.red   { color: var(--red); }
.line.yel   { color: var(--yellow); }
.line.big   { font-family: 'VT323', monospace; font-size: 18px; color: var(--g0); text-shadow: var(--glow-sm); }
.line.fade  { animation: fadeIn 0.22s ease forwards; }
@keyframes fadeIn { from{opacity:0;transform:translateX(-5px)} to{opacity:1;transform:translateX(0)} }

/* ── Input Area ── */
.input-wrap {
  border-top: 1px solid var(--border);
  padding: 12px 22px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
}
.prompt { color: var(--g0); font-size: 14px; text-shadow: var(--glow-sm); white-space: nowrap; }
input[type=text], input[type=number] {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border2);
  color: var(--g0);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  padding: 3px 4px;
  outline: none;
  caret-color: var(--g0);
  transition: border-color 0.2s;
}
input:focus { border-bottom-color: var(--g0); }
input::placeholder { color: var(--text-dim); }

/* ── Buttons ── */
.btn-row {
  padding: 10px 22px 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
button {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  padding: 9px 20px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
button:active { transform: scale(0.97); }
button.primary {
  background: rgba(0,80,20,0.7);
  color: var(--g0);
  border-color: rgba(0,255,65,0.35);
  text-shadow: 0 0 8px rgba(0,255,65,0.6);
  box-shadow: 0 0 14px rgba(0,255,65,0.08), inset 0 1px 0 rgba(0,255,65,0.08);
}
button.primary:hover { background: rgba(0,110,28,0.8); box-shadow: 0 0 22px rgba(0,255,65,0.15); }
button.secondary {
  background: var(--panel);
  color: var(--text);
  border-color: var(--border2);
}
button.secondary:hover { border-color: var(--g2); color: var(--g0); }
button.danger {
  background: rgba(60,0,0,0.7);
  color: var(--red);
  border-color: rgba(255,51,51,0.3);
}
button.danger:hover { background: rgba(90,0,0,0.8); }
button:disabled { opacity: 0.3; cursor: default; }

/* ── Full-screen effects ── */
@keyframes win-flash {
  0%   { background:rgba(0,255,65,0); }
  15%  { background:rgba(0,255,65,0.1); }
  100% { background:rgba(0,255,65,0); }
}
@keyframes bigwin-flash {
  0%,100% { background:rgba(0,255,65,0); }
  15%  { background:rgba(0,255,65,0.18); }
  45%  { background:rgba(0,255,65,0.06); }
  60%  { background:rgba(0,255,65,0.14); }
}
@keyframes lose-flash {
  0%   { background:rgba(255,51,51,0); }
  20%  { background:rgba(255,51,51,0.1); }
  100% { background:rgba(255,51,51,0); }
}
.flash-win     { animation: win-flash    0.7s ease forwards; }
.flash-bigwin  { animation: bigwin-flash 1.0s ease forwards; }
.flash-lose    { animation: lose-flash   0.7s ease forwards; }

@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.shake { animation: shake 0.45s ease; }

/* Particle / coin burst */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  font-size: 18px;
  animation: particleFly var(--dur,1s) ease-out forwards;
}
@keyframes particleFly {
  0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx,0px),var(--dy,200px)) rotate(var(--rot,360deg)) scale(0); opacity:0; }
}

/* Glitch text for big win */
@keyframes glitch {
  0%,100%{text-shadow:var(--glow)}
  20%{text-shadow:3px 0 var(--red), -3px 0 var(--g0)}
  40%{text-shadow:-3px 0 var(--g1), 3px 0 #fff}
  60%{text-shadow:2px 0 var(--g0), -2px 0 var(--red)}
}
.glitch { animation: glitch 0.4s steps(1) 4; }

/* Magic number badge */
.magic-badge {
  display: inline-block;
  background: rgba(0,60,15,0.7);
  border: 1px solid rgba(0,255,65,0.3);
  border-radius: 3px;
  padding: 2px 10px;
  font-size: 12px;
  color: var(--g0);
  text-shadow: var(--glow-sm);
  margin-left: 8px;
}

.hidden { display: none !important; }

/* Matrix-style spinning digits during reel animation */
.spin-digit {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'VT323', monospace;
  font-size: 52px;
  color: var(--g0);
  opacity: 0;
  animation: digitFlash 0.1s linear infinite;
}
@keyframes digitFlash {
  0%  { opacity:1; content:'1'; }
  100%{ opacity:0; }
}
</style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="wrap">
<div class="terminal" id="terminal">

  <div class="header">
    <div>
      <div class="header-title">/// SAM'S SLOTS ///</div>
      <div class="header-sub">SECURE GAMBLING TERMINAL v2.4.1</div>
    </div>
    <div class="status-row">
      <div class="led"></div>
      <span>ONLINE</span>
    </div>
  </div>

  <div class="reels-section">
    <div class="reels-frame">
      <div class="reel" id="r0"><span class="reel-inner" id="rv0">?</span></div>
      <div class="reel" id="r1"><span class="reel-inner" id="rv1">?</span></div>
      <div class="reel" id="r2"><span class="reel-inner" id="rv2">?</span></div>
    </div>
  </div>

  <div class="hud">
    <div class="hud-cell">
      <div class="hud-label">Balance</div>
      <div class="hud-val" id="hud-bal">$1,000</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Last Bet</div>
      <div class="hud-val" id="hud-bet">—</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Magic #</div>
      <div class="hud-val" id="hud-magic">OFF</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Round</div>
      <div class="hud-val" id="hud-round">1</div>
    </div>
  </div>

  <div class="output" id="output"></div>

  <div class="input-wrap hidden" id="input-wrap">
    <span class="prompt" id="prompt-lbl">&gt;</span>
    <input type="text" id="usr-input" autocomplete="off" autocorrect="off" spellcheck="false"/>
  </div>
  <div class="btn-row" id="btn-row"></div>

</div>
</div>

<script>
// ── Matrix Rain ──
(function(){
  const canvas = document.getElementById('matrix-bg');
  const ctx = canvas.getContext('2d');
  let cols, drops;
  const chars = '01アイウエオカキクケコサシスセソタチツテト$#%&@ABCDEF';
  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.floor(canvas.width / 16);
    drops = Array(cols).fill(1);
  }
  resize();
  window.addEventListener('resize', resize);
  setInterval(()=>{
    ctx.fillStyle = 'rgba(2,8,4,0.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '14px Share Tech Mono';
    for(let i=0;i<cols;i++){
      const ch = chars[Math.floor(Math.random()*chars.length)];
      ctx.fillText(ch, i*16, drops[i]*16);
      if(drops[i]*16 > canvas.height && Math.random() > 0.975) drops[i]=0;
      drops[i]++;
    }
  }, 50);
})();

// ── State ──
let state = {
  phase: 'name',
  name: '',
  cash: 1000,
  magicNumber: null,
  magicActive: false,
  currentBet: 0,
  round: 1,
};

const SYMBOLS = ['1','2','3','4','5','6','7','8','9'];

// ── DOM refs ──
const output    = document.getElementById('output');
const inputWrap = document.getElementById('input-wrap');
const usrInput  = document.getElementById('usr-input');
const btnRow    = document.getElementById('btn-row');
const promptLbl = document.getElementById('prompt-lbl');
const terminal  = document.getElementById('terminal');
const hudBal    = document.getElementById('hud-bal');
const hudBet    = document.getElementById('hud-bet');
const hudMagic  = document.getElementById('hud-magic');
const hudRound  = document.getElementById('hud-round');
const reels     = [document.getElementById('r0'),document.getElementById('r1'),document.getElementById('r2')];
const reelVals  = [document.getElementById('rv0'),document.getElementById('rv1'),document.getElementById('rv2')];

// ── Helpers ──
function print(txt, cls='', delay=0){
  return new Promise(res=>{
    setTimeout(()=>{
      const el = document.createElement('span');
      el.className = 'line fade' + (cls?' '+cls:'');
      el.textContent = txt;
      output.appendChild(el);
      output.appendChild(document.createElement('br'));
      output.scrollTop = output.scrollHeight;
      res();
    }, delay);
  });
}

function clearBtns(){ btnRow.innerHTML=''; }

function addBtn(label, cls, fn){
  const b = document.createElement('button');
  b.textContent = label;
  b.className = cls;
  b.onclick = fn;
  btnRow.appendChild(b);
  return b;
}

function showInput(type='text', ph=''){
  inputWrap.classList.remove('hidden');
  usrInput.type = type;
  usrInput.placeholder = ph;
  usrInput.value = '';
  setTimeout(()=>usrInput.focus(), 60);
}

function hideInput(){ inputWrap.classList.add('hidden'); clearBtns(); }

function updateHUD(animate=false){
  hudBal.textContent   = '$' + state.cash.toLocaleString();
  hudBet.textContent   = state.currentBet ? '$'+state.currentBet.toLocaleString() : '—';
  hudMagic.textContent = state.magicNumber !== null ? '#'+state.magicNumber+(state.magicActive?' ✓':'') : 'OFF';
  hudRound.textContent = state.round;
  if(animate){
    [hudBal,hudBet,hudRound].forEach(el=>{
      el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
    });
  }
}

function flashOutput(cls){
  output.classList.remove('flash-win','flash-bigwin','flash-lose');
  void output.offsetWidth;
  output.classList.add(cls);
  setTimeout(()=>output.classList.remove(cls),1100);
}

function shakeTerminal(){
  terminal.classList.add('shake');
  setTimeout(()=>terminal.classList.remove('shake'),500);
}

// Coin/particle burst
function spawnParticles(x, y, count=16, big=false){
  const emojis = big
    ? ['💰','🤑','💵','✨','🎰','💎','🪙']
    : ['🪙','💵','✨','💰'];
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = Math.random()*Math.PI*2;
    const dist  = 60 + Math.random()*(big?200:120);
    p.style.setProperty('--dx',(Math.cos(angle)*dist)+'px');
    p.style.setProperty('--dy',(Math.sin(angle)*dist+60)+'px');
    p.style.setProperty('--rot',(Math.random()*720-360)+'deg');
    p.style.setProperty('--dur',(0.7+Math.random()*0.8)+'s');
    p.style.left = x+'px'; p.style.top = y+'px';
    p.style.animationDelay=(Math.random()*0.2)+'s';
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

// Applause sound via Web Audio API
function playApplause(big=false){
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const duration = big ? 3.5 : 2.0;
    const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
    const data = buf.getChannelData(0);
    // Layered noise bursts that simulate crowd applause
    for(let i=0;i<data.length;i++){
      const t = i/ctx.sampleRate;
      const envelope = Math.sin(Math.PI*t/duration) * (0.6 + 0.4*Math.random());
      // Random pops at quasi-periodic intervals simulate clapping hands
      const clap = (Math.random() < 0.012) ? (Math.random()*2-1)*3 : 0;
      const noise = (Math.random()*2-1)*0.15;
      data[i] = (noise + clap) * envelope * (big ? 1.0 : 0.7);
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    // Low-pass filter to round the clap sound
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = big ? 3200 : 2800;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, 0);
    gain.gain.linearRampToValueAtTime(1.0, 0.15);
    gain.gain.setValueAtTime(1.0, duration-0.4);
    gain.gain.linearRampToValueAtTime(0, duration);
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start();
    src.stop(ctx.currentTime + duration);
  } catch(e){}
}

// ── Reel Spin Animation ──
function spinReels(a, b, c){
  return new Promise(res=>{
    const vals = [a, b, c];
    const spinDurs = [900, 1100, 1300]; // stagger stop times
    reels.forEach((r,i)=>{
      reelVals[i].textContent = '?';
      r.classList.add('spinning');
      r.classList.remove('win-big','win-part','lose');
      // Scramble digits while spinning
      const interval = setInterval(()=>{
        reelVals[i].textContent = SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
      }, 80);
      setTimeout(()=>{
        clearInterval(interval);
        r.classList.remove('spinning');
        reelVals[i].textContent = vals[i];
      }, spinDurs[i]);
    });
    setTimeout(res, spinDurs[2] + 150);
  });
}

function colorReels(result, a, b, c){
  setTimeout(()=>{
    if(result === 'bigwin'){
      reels.forEach(r=>r.classList.add('win-big'));
      reelVals.forEach(v=>v.classList.add('glitch'));
      setTimeout(()=>reelVals.forEach(v=>v.classList.remove('glitch')),1700);
    } else if(result === 'win'){
      // highlight matching pair
      const counts = {};
      [a,b,c].forEach(v=>counts[v]=(counts[v]||0)+1);
      [a,b,c].forEach((v,i)=>{ if(counts[v]>1) reels[i].classList.add('win-part'); });
    } else {
      reels.forEach(r=>r.classList.add('lose'));
    }
  }, 100);
}

// ── Input handler ──
function handle(val){
  val = val.trim();
  if(!val) return;
  print('> '+val, 'dim');
  switch(state.phase){
    case 'name':       doName(val);       break;
    case 'addCash':    doAddCash(val);    break;
    case 'addCashAmt': doAddCashAmt(val); break;
    case 'magic':      doMagic(val);      break;
    case 'magicNum':   doMagicNum(val);   break;
    case 'bet':        doBet(val);        break;
    case 'useMagic':   doUseMagic(val);   break;
    case 'again':      doAgain(val);      break;
  }
}

// ── Phases ──
function doName(val){
  state.name = val.charAt(0).toUpperCase()+val.slice(1).toLowerCase();
  setTimeout(()=>{
    print('');
    print('> Authenticating '+state.name+'...', 'dim');
    setTimeout(()=>{
      print('> Access granted.', 'g');
      print('> Account balance loaded: $'+state.cash.toLocaleString(), 'g');
      updateHUD();
      setTimeout(startSession, 500);
    }, 600);
  }, 200);
}

function startSession(){
  print('');
  print('Would you like to add cash to your account?', '');
  state.phase = 'addCash';
  showInput('text','yes / no');
  clearBtns();
  addBtn('Yes, add cash','secondary',()=>handle('yes'));
  addBtn('No thanks','secondary',()=>handle('no'));
  promptLbl.textContent='>';
}

function doAddCash(val){
  if(val==='yes'){
    state.phase='addCashAmt';
    showInput('number','Amount to deposit');
    clearBtns();
    [100,250,500,1000].forEach(n=>addBtn('$'+n,'secondary',()=>handle(String(n))));
    promptLbl.textContent='ADD $:';
  } else {
    print('No deposit made.','dim');
    askMagic();
  }
}

function doAddCashAmt(val){
  const amt = parseInt(val);
  if(isNaN(amt)||amt<=0){ print('Enter a valid amount.','red'); return; }
  state.cash += amt;
  print('Deposited $'+amt.toLocaleString()+'.  Balance: $'+state.cash.toLocaleString(),'g');
  updateHUD(true);
  askMagic();
}

function askMagic(){
  print('');
  print('Purchase a Magic Number multiplier? (cost = $100 × your number)','');
  state.phase='magic';
  showInput('text','yes / no');
  clearBtns();
  addBtn('Yes, buy Magic #','secondary',()=>handle('yes'));
  addBtn('No thanks','secondary',()=>handle('no'));
}

function doMagic(val){
  if(val==='yes'){
    print('Choose your Magic Number (1–7):','');
    state.phase='magicNum';
    showInput('number','1 – 7');
    clearBtns();
    [1,2,3,4,5,6,7].forEach(n=>addBtn('#'+n,'secondary',()=>handle(String(n))));
    promptLbl.textContent='MAGIC #:';
  } else {
    print('No magic number purchased.','dim');
    startRound();
  }
}

function doMagicNum(val){
  const n = parseInt(val);
  if(isNaN(n)||n<1||n>7){ print('Choose a number from 1 to 7.','red'); return; }
  const cost = n*100;
  if(cost > state.cash){ print('Insufficient funds for that magic number.','red'); return; }
  state.magicNumber = n;
  state.cash -= cost;
  print('Magic Number #'+n+' purchased for $'+cost+'.','g');
  print('Your bet will be multiplied by '+n+' when activated.','dim');
  updateHUD(true);
  startRound();
}

function startRound(){
  print('');
  print('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━','dim');
  print('  ROUND '+state.round,'big');
  print('  Balance: $'+state.cash.toLocaleString(),'g');
  print('');
  state.phase='bet';
  showInput('number','Enter bet amount');
  clearBtns();
  [10,25,50,100,250].forEach(n=>{ if(n<=state.cash) addBtn('$'+n,'secondary',()=>handle(String(n))); });
  if(state.cash>0) addBtn('⚡ All In  $'+state.cash.toLocaleString(),'danger',()=>handle(String(state.cash)));
  promptLbl.textContent='BET $:';
}

async function doBet(val){
  let bet = parseInt(val);
  if(isNaN(bet)||bet<=0){ print('Enter a valid bet amount.','red'); return; }
  if(bet>state.cash){ print('Capping bet at $'+state.cash+'.','yel'); bet=state.cash; }
  state.currentBet = bet;
  updateHUD();

  if(state.magicNumber!==null){
    print('');
    print('Activate Magic Number #'+state.magicNumber+' multiplier?','');
    state.phase='useMagic';
    showInput('text','yes / no');
    clearBtns();
    addBtn('Yes, activate','secondary',()=>handle('yes'));
    addBtn('No','secondary',()=>handle('no'));
    promptLbl.textContent='>';
  } else {
    await spinAndResolve();
  }
}

async function doUseMagic(val){
  if(val==='yes'){
    state.currentBet *= state.magicNumber;
    state.magicActive = true;
    print('Magic multiplier active! Effective bet: $'+state.currentBet.toLocaleString(),'g');
    if(state.currentBet > state.cash){
      state.currentBet = state.cash;
      print('(Capped at balance: $'+state.cash.toLocaleString()+')','yel');
    }
    updateHUD();
  } else {
    state.magicActive = false;
    print('Magic number not used this round.','dim');
  }
  await spinAndResolve();
}

async function spinAndResolve(){
  hideInput();
  print('');
  print('> Spinning reels...','dim');

  const a = Math.floor(Math.random()*9)+1;
  const b = Math.floor(Math.random()*9)+1;
  const c = Math.floor(Math.random()*9)+1;

  await spinReels(a, b, c);

  print('> '+a+'  '+b+'  '+c,'big');
  print('');

  if(a===b && b===c){
    // BIG WIN
    colorReels('bigwin', a, b, c);
    flashOutput('flash-bigwin');
    const winnings = Math.min(bet_pow(state.currentBet), 999999999);
    state.cash += winnings;
    playApplause(true);
    const rect = reels[1].getBoundingClientRect();
    spawnParticles(rect.left+rect.width/2, rect.top+rect.height/2, 30, true);
    setTimeout(()=>spawnParticles(rect.left+rect.width/2, rect.top+rect.height/2, 20, true), 400);
    print('🎰  JACKPOT — YOU WON BIG!','g');
    print('Winnings: $'+winnings.toLocaleString(),'g');
    print('New balance: $'+state.cash.toLocaleString(),'g');
  } else if(a===b || a===c || b===c){
    // PARTIAL WIN
    colorReels('win', a, b, c);
    flashOutput('flash-win');
    const winnings = Math.min(bet_pow(state.currentBet), 999999999);
    state.cash += winnings;
    playApplause(false);
    const rect = reels[1].getBoundingClientRect();
    spawnParticles(rect.left+rect.width/2, rect.top+rect.height/2, 14, false);
    print('✅  YOU WIN!','g');
    print('Winnings: $'+winnings.toLocaleString(),'g');
    print('New balance: $'+state.cash.toLocaleString(),'g');
  } else {
    // LOSE
    colorReels('lose', a, b, c);
    flashOutput('flash-lose');
    shakeTerminal();
    state.cash = Math.max(0, state.cash - state.currentBet);
    print('❌  No match — you lost $'+state.currentBet.toLocaleString()+'.','red');
    print('Balance: $'+state.cash.toLocaleString(),'red');
  }

  updateHUD(true);
  state.round++;
  state.magicActive = false;

  if(state.cash <= 0){
    print('');
    print('💸  Out of funds. Game over, '+state.name+'.','red');
    clearBtns();
    addBtn('▶  Play Again','primary',()=>location.reload());
    return;
  }

  setTimeout(()=>{
    print('');
    print('Play another round?');
    state.phase = 'again';
    showInput('text','yes / no');
    clearBtns();
    addBtn('▶  Spin Again','primary',()=>handle('yes'));
    addBtn('Cash Out','secondary',()=>handle('no'));
    promptLbl.textContent='>';
  }, 600);
}

// Safe exponentiation — avoids Infinity for large bets
function bet_pow(bet){
  if(bet <= 9) return Math.pow(bet, bet);
  return bet * 100; // fallback for very large bets
}

function doAgain(val){
  if(val==='yes'){
    startRound();
  } else {
    print('');
    print('Thanks for playing, '+state.name+'!','big');
    print('Final balance: $'+state.cash.toLocaleString(),'g');
    print('');
    print('/// CONNECTION CLOSED ///','dim');
    hideInput();
    clearBtns();
    addBtn('▶  Play Again','primary',()=>location.reload());
  }
}

// ── Boot Sequence ──
(async function boot(){
  await print('> Initializing SAM\'S SLOTS v2.4.1...','dim');
  await print('> Connecting to secure server...','dim');
  await new Promise(r=>setTimeout(r,300));
  await print('> Encryption handshake: OK','dim');
  await new Promise(r=>setTimeout(r,200));
  await print('> Session started.','g');
  await print('');
  await print('What is your name?');
  state.phase='name';
  showInput('text','Enter your name');
  promptLbl.textContent='>';
})();

usrInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const v = usrInput.value.trim();
    if(v) handle(v);
    usrInput.value='';
  }
});
</script>
